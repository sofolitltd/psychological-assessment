name: psychological_assessment
description: "Psychological Assessment App — Offline, production-ready"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_markdown_plus: ^1.0.7
  pdf: ^3.12.0
  printing: ^5.14.3
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  bangla_pdf_fixer: ^2.0.0
  url_launcher: ^6.3.2
  lucide_icons_flutter: ^3.1.14+2
  http: ^1.3.0
  share_plus: ^13.2.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  google_sign_in: ^7.2.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/data/upcoming/
    - assets/images/
